<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citibank – Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E31837;--red-dark:#a0101f;--bg:#0a0a0a;--card:#161616;--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45);--nav-h:68px;}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
#shell{max-width:100%;margin:0 auto;min-height:100vh;background:var(--bg);padding:16px 12px 120px 12px;animation:fadeUp .4s ease both;}
#pageLoader{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(227,24,55,.2);border-top-color:#E31837;animation:spin .75s linear infinite;}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 0;margin-bottom:16px;}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;text-decoration:none;flex-shrink:0;}
.page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.profile-header{background:linear-gradient(135deg,rgba(227,24,55,0.15),rgba(100,10,20,0.2));border-radius:18px;padding:24px;border:1px solid rgba(227,24,55,0.2);text-align:center;margin-bottom:24px;}
.avatar-large{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,#E31837,#a0101f);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:32px;margin:0 auto 12px;box-shadow:0 8px 24px rgba(227,24,55,.3);}
.profile-name{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:4px;}
.profile-email{font-size:13px;color:var(--muted);}
.profile-status{font-size:12px;color:#4ade80;margin-top:8px;}
.section{margin-bottom:24px;}
.section-title{font-size:13px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:12px;padding:0 4px;}
.form-group{background:var(--card);border-radius:14px;padding:18px;border:1px solid var(--border);margin-bottom:12px;}
.form-field{margin-bottom:14px;}
.form-field:last-child{margin-bottom:0;}
.form-field label{display:block;margin-bottom:6px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.38);}
.form-field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:white;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;}
.form-field input:focus{border-color:rgba(227,24,55,.6);}
.form-field input::placeholder{color:rgba(255,255,255,.2);}
.form-field input:disabled{opacity:0.6;cursor:not-allowed;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.btn{width:100%;padding:14px;background:linear-gradient(135deg,#E31837,#a0101f);border:none;border-radius:14px;color:white;font-size:15px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(227,24,55,.3);transition:opacity .2s,transform .15s;margin-bottom:12px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-secondary{background:rgba(255,255,255,0.06);color:var(--text);border:1px solid var(--border);box-shadow:none;}
.btn-edit{background:transparent;border:1.5px solid rgba(227,24,55,0.5);color:var(--red);margin-bottom:16px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;height:var(--nav-h);background:rgba(14,14,14,.97);border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);display:flex;align-items:stretch;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:color .15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
.nav-item.active,.nav-item:hover{color:#E31837;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#E31837;margin-top:-2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){
  #shell{padding:12px 10px 120px 10px;}
  .form-row{grid-template-columns:1fr;}
}
</style>
</head>
<body>
<div id="pageLoader"><div class="spin"></div></div>
<div id="shell" style="display:none">
  <div class="topbar">
    <a class="back-btn" href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="page-title">My Profile</span>
  </div>

  <div class="profile-header">
    <div class="avatar-large" id="avatarLarge">CB</div>
    <div class="profile-name" id="profileName">—</div>
    <div class="profile-email" id="profileEmail">—</div>
    <div class="profile-status">✓ Account Verified</div>
  </div>

  <!-- Personal Information -->
  <div class="section">
    <div class="section-title">Personal Information</div>
    <div class="form-group">
      <button class="btn btn-edit" onclick="toggleEditMode()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:6px;"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
        <span id="editBtnText">Edit Information</span>
      </button>
      <div class="form-field"><label>Full Name</label><input type="text" id="fullName" placeholder="Full Name" disabled/></div>
      <div class="form-row">
        <div class="form-field"><label>First Name</label><input type="text" id="firstName" placeholder="First Name" disabled/></div>
        <div class="form-field"><label>Last Name</label><input type="text" id="lastName" placeholder="Last Name" disabled/></div>
      </div>
      <div class="form-field"><label>Email Address</label><input type="email" id="email" placeholder="Email" disabled/></div>
      <div class="form-field"><label>Phone Number</label><input type="tel" id="phone" placeholder="+1 (555) 000-0000" disabled/></div>
      <div class="form-field"><label>Date of Birth</label><input type="date" id="dob" disabled/></div>
      <div class="form-field"><label>Country</label><input type="text" id="country" placeholder="Country" disabled/></div>
    </div>
  </div>

  <!-- Account Information -->
  <div class="section">
    <div class="section-title">Account Information</div>
    <div class="form-group">
      <div class="form-field"><label>Account Type</label><input type="text" id="accountType" disabled/></div>
      <div class="form-field"><label>Account Status</label><input type="text" value="Active &amp; Verified" disabled style="color:#4ade80;"/></div>
      <div class="form-field"><label>Member Since</label><input type="text" id="memberSince" disabled/></div>
      <div class="form-field"><label>Current Balance</label><input type="text" id="balance" disabled style="color:#4ade80;"/></div>
    </div>
  </div>

  <!-- Address -->
  <div class="section">
    <div class="section-title">Address</div>
    <div class="form-group">
      <div class="form-field"><label>Street Address</label><input type="text" id="street" placeholder="123 Main Street" disabled/></div>
      <div class="form-row">
        <div class="form-field"><label>City</label><input type="text" id="city" placeholder="City" disabled/></div>
        <div class="form-field"><label>State/Province</label><input type="text" id="state" placeholder="State" disabled/></div>
      </div>
      <div class="form-row">
        <div class="form-field"><label>Postal Code</label><input type="text" id="zip" placeholder="Postal Code" disabled/></div>
        <div class="form-field"><label>Country</label><input type="text" id="countryAddr" placeholder="Country" disabled/></div>
      </div>
    </div>
  </div>

  <!-- Emergency Contact -->
  <div class="section">
    <div class="section-title">Emergency Contact</div>
    <div class="form-group">
      <div class="form-field"><label>Contact Name</label><input type="text" id="emergencyName" placeholder="Full Name" disabled/></div>
      <div class="form-field"><label>Relationship</label><input type="text" id="emergencyRelation" placeholder="e.g., Spouse, Parent" disabled/></div>
      <div class="form-field"><label>Phone Number</label><input type="tel" id="emergencyPhone" placeholder="+1 (555) 000-0000" disabled/></div>
    </div>
  </div>

  <div id="actionButtons" style="display:none;">
    <button class="btn" onclick="saveChanges()">Save Changes</button>
    <button class="btn btn-secondary" onclick="cancelEdit()">Cancel</button>
  </div>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
  <a class="nav-item" href="card.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card</a>
  <a class="nav-item" href="send.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send</a>
  <a class="nav-item" href="contact.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.5 19.5 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>Contact</a>
  <a class="nav-item active" href="profile.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="8" r="4"/><path d="M20 21a8 8 0 1 0-16 0"/></svg>Profile<div class="nav-dot"></div></a>
</nav>

<script>
const SUPABASE_URL='https://rgtbqipsdebekzznswll.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_QF5lXikZj0cRv1sipEFtyg_zqjw0eW1';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let _profile=null;
let _editMode=false;

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  const uid=session.user.id;
  const {data:prof,error}=await _sb.from('profiles').select('*').eq('id',uid).single();
  if(error&&error.code!=='PGRST116'){console.warn('Profile fetch:',error.message);}
  _profile=prof||{id:uid,full_name:session.user.user_metadata?.full_name||'User',email:session.user.email,balance:0};

  const name=_profile.full_name||'User';
  const initials=name.split(' ').map(n=>n[0]||'').join('').toUpperCase().slice(0,2)||'CB';
  document.getElementById('avatarLarge').textContent=initials;
  document.getElementById('profileName').textContent=name;
  document.getElementById('profileEmail').textContent=_profile.email||session.user.email||'—';

  document.getElementById('fullName').value=_profile.full_name||'';
  document.getElementById('firstName').value=_profile.first_name||'';
  document.getElementById('lastName').value=_profile.last_name||'';
  document.getElementById('email').value=_profile.email||session.user.email||'';
  document.getElementById('phone').value=_profile.phone||'';
  document.getElementById('dob').value=_profile.date_of_birth||'';
  document.getElementById('country').value=_profile.country||'';
  document.getElementById('accountType').value=_profile.account_type||'Premier Savings';
  document.getElementById('memberSince').value=_profile.created_at?new Date(_profile.created_at).toLocaleDateString('en-US',{year:'numeric',month:'long',day:'numeric'}):'—';
  document.getElementById('balance').value='$'+Number(_profile.balance||0).toLocaleString('en-US',{minimumFractionDigits:2});
  document.getElementById('street').value=_profile.street_address||'';
  document.getElementById('city').value=_profile.city||'';
  document.getElementById('state').value=_profile.state||'';
  document.getElementById('zip').value=_profile.postal_code||'';
  document.getElementById('countryAddr').value=_profile.country||'';
  document.getElementById('emergencyName').value=_profile.emergency_contact_name||'';
  document.getElementById('emergencyRelation').value=_profile.emergency_relation||'';
  document.getElementById('emergencyPhone').value=_profile.emergency_phone||'';

  document.getElementById('pageLoader').style.display='none';
  document.getElementById('shell').style.display='block';
})();

function toggleEditMode(){
  _editMode=!_editMode;
  const LOCKED=['balance','memberSince','email','accountType'];
  document.querySelectorAll('input:not([type="hidden"])').forEach(f=>{
    if(!LOCKED.includes(f.id)) f.disabled=!_editMode;
  });
  document.getElementById('actionButtons').style.display=_editMode?'block':'none';
  document.getElementById('editBtnText').textContent=_editMode?'Cancel Edit':'Edit Information';
}

function cancelEdit(){
  _editMode=true;
  toggleEditMode();
}

async function saveChanges(){
  const updates={
    first_name:document.getElementById('firstName').value.trim(),
    last_name:document.getElementById('lastName').value.trim(),
    full_name:document.getElementById('fullName').value.trim(),
    phone:document.getElementById('phone').value.trim(),
    date_of_birth:document.getElementById('dob').value||null,
    country:document.getElementById('country').value.trim(),
    street_address:document.getElementById('street').value.trim(),
    city:document.getElementById('city').value.trim(),
    state:document.getElementById('state').value.trim(),
    postal_code:document.getElementById('zip').value.trim(),
    emergency_contact_name:document.getElementById('emergencyName').value.trim(),
    emergency_relation:document.getElementById('emergencyRelation').value.trim(),
    emergency_phone:document.getElementById('emergencyPhone').value.trim(),
    updated_at:new Date().toISOString()
  };
  const btn=document.querySelector('#actionButtons .btn');
  btn.disabled=true;btn.textContent='Saving…';
  const {error}=await _sb.from('profiles').update(updates).eq('id',_profile.id);
  btn.disabled=false;btn.textContent='Save Changes';
  if(error){showToast('Error saving: '+error.message,false);return;}
  // Update header display
  if(updates.full_name){
    document.getElementById('profileName').textContent=updates.full_name;
    const initials=updates.full_name.split(' ').map(n=>n[0]||'').join('').toUpperCase().slice(0,2);
    document.getElementById('avatarLarge').textContent=initials;
  }
  showToast('Profile updated successfully!');
  cancelEdit();
}

function showToast(msg,ok=true){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;top:22px;right:18px;z-index:9999;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;max-width:300px;box-shadow:0 8px 28px rgba(0,0,0,.5);font-family:DM Sans,sans-serif;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=(ok?'✓  ':'✗  ')+msg;
  t.style.background=ok?'linear-gradient(135deg,#0f2d1a,#091c10)':'linear-gradient(135deg,#2d0f0f,#1c0808)';
  t.style.border=ok?'1px solid rgba(34,197,94,.35)':'1px solid rgba(227,24,55,.35)';
  t.style.color=ok?'#4ade80':'#f87171';t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},3200);
}
</script>
</body>
</html>
