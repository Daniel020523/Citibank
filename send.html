<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citibank – Send Money</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{--red:#E31837;--red-dark:#a0101f;--bg:#0a0a0a;--card:#161616;--border:rgba(255,255,255,0.07);--text:#fff;--muted:rgba(255,255,255,0.45);--nav-h:68px;}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}
#shell{max-width:100%;margin:0 auto;min-height:100vh;background:var(--bg);padding:16px 12px 120px 12px;animation:fadeUp .4s ease both;}
#pageLoader{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(227,24,55,.2);border-top-color:#E31837;animation:spin .75s linear infinite;}
.topbar{display:flex;align-items:center;gap:14px;padding:12px 0;margin-bottom:16px;}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;text-decoration:none;flex-shrink:0;}
.page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}
.form-section{background:var(--card);border-radius:16px;padding:20px;border:1px solid var(--border);margin-bottom:16px;}
.section-title{font-size:14px;font-weight:700;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:16px;}
.field{margin-bottom:14px;}
.field:last-child{margin-bottom:0;}
.field label{display:block;margin-bottom:6px;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,0.38);}
.field input,.field select{width:100%;background:rgba(255,255,255,0.05);border:1px solid var(--border);border-radius:12px;padding:12px 14px;color:white;font-size:15px;font-family:'DM Sans',sans-serif;outline:none;transition:border .15s;}
.field input:focus,.field select:focus{border-color:rgba(227,24,55,.6);}
.field input::placeholder{color:rgba(255,255,255,.2);}
.field select option{background:#1e1e1e;color:white;}
.acct-lookup{display:none;margin-top:8px;padding:10px 14px;border-radius:10px;border:1px solid rgba(74,222,128,0.3);background:rgba(74,222,128,0.07);font-size:13px;color:#4ade80;font-weight:600;align-items:center;gap:10px;}
.acct-lookup.visible{display:flex;}
.lookup-spin{width:16px;height:16px;border-radius:50%;border:2px solid rgba(74,222,128,0.25);border-top-color:#4ade80;animation:spin .6s linear infinite;flex-shrink:0;}
.summary-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--border);}
.summary-row:last-child{border-bottom:none;padding-top:12px;margin-top:4px;border-top:1px solid rgba(227,24,55,0.3);}
.summary-label{font-size:12px;color:var(--muted);}
.summary-val{font-family:'DM Mono',monospace;font-size:14px;font-weight:700;color:#4ade80;}
.summary-row:last-child .summary-label{font-weight:700;color:var(--text);font-size:13px;}
.summary-row:last-child .summary-val{font-size:16px;}
.btn{width:100%;padding:15px;background:linear-gradient(135deg,#E31837,#a0101f);border:none;border-radius:14px;color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(227,24,55,.3);transition:opacity .2s,transform .15s;margin-top:8px;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.info-banner{background:rgba(227,24,55,0.08);border-left:3px solid var(--red);padding:12px 14px;border-radius:8px;font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;height:var(--nav-h);background:rgba(14,14,14,.97);border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);display:flex;align-items:stretch;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:color .15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
.nav-item.active,.nav-item:hover{color:#E31837;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#E31837;margin-top:-2px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:480px){#shell{padding:12px 10px 120px 10px;}}
</style>
</head>
<body>
<div id="pageLoader"><div class="spin"></div></div>
<div id="shell" style="display:none">
  <div class="topbar">
    <a class="back-btn" href="dashboard.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="page-title">Send Money</span>
  </div>

  <div class="info-banner">💱 Send money internationally — USA, UK banks, Western Union &amp; more.</div>

  <div class="form-section">
    <div class="section-title">Recipient Bank / Service</div>
    <div class="field">
      <label>Select Bank or Transfer Service</label>
      <select id="bankSelect" onchange="onBankChange()">
        <option value="">— Choose bank or service —</option>
        <optgroup label="🇺🇸 USA Banks">
          <option value="chase|usa|aba">Chase Bank</option>
          <option value="bofa|usa|aba">Bank of America</option>
          <option value="wells|usa|aba">Wells Fargo</option>
          <option value="citi|usa|aba">Citibank</option>
          <option value="td|usa|aba">TD Bank</option>
          <option value="usbank|usa|aba">U.S. Bank</option>
          <option value="pnc|usa|aba">PNC Bank</option>
          <option value="capital_one|usa|aba">Capital One</option>
          <option value="goldman|usa|aba">Goldman Sachs</option>
          <option value="ally|usa|aba">Ally Bank</option>
          <option value="discover|usa|aba">Discover Bank</option>
        </optgroup>
        <optgroup label="🇬🇧 UK Banks">
          <option value="hsbc|uk|sort">HSBC UK</option>
          <option value="barclays|uk|sort">Barclays</option>
          <option value="lloyds|uk|sort">Lloyds Bank</option>
          <option value="natwest|uk|sort">NatWest</option>
          <option value="santander_uk|uk|sort">Santander UK</option>
          <option value="halifax|uk|sort">Halifax</option>
          <option value="metro|uk|sort">Metro Bank</option>
          <option value="monzo|uk|sort">Monzo</option>
          <option value="starling|uk|sort">Starling Bank</option>
          <option value="revolut_uk|uk|sort">Revolut (UK)</option>
        </optgroup>
        <optgroup label="🌍 International Transfer Services">
          <option value="western_union|intl|ref">Western Union</option>
          </optgroup>
      </select>
    </div>
    <div class="field">
      <label>Account / Reference Number</label>
      <input type="text" id="accountNumber" placeholder="Account or reference number" maxlength="30" oninput="onAccountInput()"/>
      <div class="acct-lookup" id="acctLookup">
        <span class="lookup-spin" id="lookupSpinner"></span>
        <span id="lookupText">Verifying account…</span>
      </div>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">Amount (USD)</div>
    <div class="field">
      <label>Transfer Amount</label>
      <input type="number" id="amount" placeholder="0.00" min="1" oninput="updateSummary()"/>
    </div>
  </div>

  <div class="form-section">
    <div class="section-title">Summary</div>
    <div class="summary-row"><span class="summary-label">Transfer Amount</span><span class="summary-val" id="summaryAmount">$0.00</span></div>
    <div class="summary-row"><span class="summary-label">Total</span><span class="summary-val" id="totalAmount">$0.00</span></div>
  </div>

  <button class="btn" onclick="initiateTransfer()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" style="vertical-align:middle;margin-right:8px"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    Send Money
  </button>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
  <a class="nav-item" href="card.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card</a>
  <a class="nav-item active" href="send.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send<div class="nav-dot"></div></a>
  <a class="nav-item" href="contact.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.5 19.5 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>Contact</a>
  <a class="nav-item" href="livechat.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
</nav>

<script>
const SUPABASE_URL='https://rgtbqipsdebekzznswll.supabase.co';
const SUPABASE_ANON_KEY='sb_publishable_QF5lXikZj0cRv1sipEFtyg_zqjw0eW1';
const _sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
let _profile=null,_session=null;

(async()=>{
  const {data:{session}}=await _sb.auth.getSession();
  if(!session){location.href='index.html';return;}
  _session=session;
  const {data:prof}=await _sb.from('profiles').select('*').eq('id',session.user.id).single();
  _profile=prof||{balance:0};
  document.getElementById('pageLoader').style.display='none';
  document.getElementById('shell').style.display='block';
})();

// Reset lookup when bank changes
function onBankChange(){
  hideLookup();
  document.getElementById('accountNumber').value='';
}

// Western Union account name map
const WU_LOOKUP={'WUIB644921633810':'DurableXchangeXXX'};

let _lookupTimer=null;
function onAccountInput(){
  const bankVal=document.getElementById('bankSelect').value;
  const account=document.getElementById('accountNumber').value.trim();
  clearTimeout(_lookupTimer);
  hideLookup();
  if(bankVal!=='western_union|intl|ref'||!account) return;
  // Debounce 400ms then show spinner, resolve after 2.4s
  _lookupTimer=setTimeout(()=>{
    const box=document.getElementById('acctLookup');
    const spinner=document.getElementById('lookupSpinner');
    const txt=document.getElementById('lookupText');
    spinner.style.display='block';
    txt.textContent='Verifying account…';
    box.style.borderColor='rgba(74,222,128,0.3)';
    box.style.background='rgba(74,222,128,0.07)';
    box.style.color='#4ade80';
    box.classList.add('visible');
    _lookupTimer=setTimeout(()=>{
      spinner.style.display='none';
      const name=WU_LOOKUP[account.toUpperCase()];
      if(name){
        txt.innerHTML='✓&nbsp; '+name;
      } else {
        txt.innerHTML='✗&nbsp; Account not found';
        box.style.borderColor='rgba(227,24,55,0.35)';
        box.style.background='rgba(227,24,55,0.07)';
        box.style.color='#f87171';
      }
    },2400);
  },400);
}

function hideLookup(){
  const box=document.getElementById('acctLookup');
  box.classList.remove('visible');
  box.style.borderColor='rgba(74,222,128,0.3)';
  box.style.background='rgba(74,222,128,0.07)';
  box.style.color='#4ade80';
  document.getElementById('lookupSpinner').style.display='block';
  document.getElementById('lookupText').textContent='Verifying account…';
}

function updateSummary(){
  const amt=parseFloat(document.getElementById('amount').value)||0;
  const fmt=v=>'$'+v.toLocaleString('en-US',{minimumFractionDigits:2});
  document.getElementById('summaryAmount').textContent=fmt(amt);
  document.getElementById('totalAmount').textContent=fmt(amt);
}

function initiateTransfer(){
  const bankVal=document.getElementById('bankSelect').value;
  const account=document.getElementById('accountNumber').value.trim();
  const amount=parseFloat(document.getElementById('amount').value);
  if(!bankVal){showToast('Please select a bank or service.',false);return;}
  if(!account){showToast('Please enter the account or reference number.',false);return;}
  if(!amount||amount<=0){showToast('Please enter a valid amount.',false);return;}
  location.href='pin.html';
}

function showToast(msg,ok=true){
  let t=document.getElementById('_toast');
  if(!t){t=document.createElement('div');t.id='_toast';
    t.style.cssText='position:fixed;top:22px;right:18px;z-index:9999;border-radius:14px;padding:13px 18px;font-size:14px;font-weight:600;max-width:300px;box-shadow:0 8px 28px rgba(0,0,0,.5);font-family:DM Sans,sans-serif;transition:opacity .3s;';
    document.body.appendChild(t);}
  t.textContent=(ok?'✓  ':'✗  ')+msg;
  t.style.background=ok?'linear-gradient(135deg,#0f2d1a,#091c10)':'linear-gradient(135deg,#2d0f0f,#1c0808)';
  t.style.border=ok?'1px solid rgba(34,197,94,.35)':'1px solid rgba(227,24,55,.35)';
  t.style.color=ok?'#4ade80':'#f87171';t.style.opacity='1';
  clearTimeout(t._timer);t._timer=setTimeout(()=>{t.style.opacity='0';},3200);
}
</script>
</body>
</html>
