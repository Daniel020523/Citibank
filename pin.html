<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Citibank – Enter PIN</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
:root{
  --red:#E31837;--red-dark:#a0101f;
  --bg:#0a0a0a;--card:#161616;
  --border:rgba(255,255,255,0.07);
  --text:#fff;--muted:rgba(255,255,255,0.45);
  --nav-h:68px;
}
html,body{min-height:100vh;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--text);-webkit-font-smoothing:antialiased;}

/* Page loader */
#pageLoader{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;align-items:center;justify-content:center;}
.spin{width:42px;height:42px;border-radius:50%;border:3px solid rgba(227,24,55,.2);border-top-color:#E31837;animation:spin .75s linear infinite;}

/* Shell */
#shell{display:none;min-height:100vh;padding:0 0 var(--nav-h) 0;flex-direction:column;align-items:center;animation:fadeUp .4s ease both;}
#shell.show{display:flex;}

/* Topbar */
.topbar{width:100%;display:flex;align-items:center;gap:14px;padding:16px 20px 12px;flex-shrink:0;}
.back-btn{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);cursor:pointer;text-decoration:none;flex-shrink:0;}
.page-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:700;}

/* Main content area */
.content{flex:1;width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 24px 24px;gap:32px;}

/* Lock icon */
.lock-wrap{width:72px;height:72px;border-radius:22px;background:rgba(227,24,55,0.1);border:1px solid rgba(227,24,55,0.2);display:flex;align-items:center;justify-content:center;}

/* Heading */
.pin-heading{text-align:center;}
.pin-heading h2{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;margin-bottom:6px;}
.pin-heading p{font-size:13px;color:var(--muted);line-height:1.5;}

/* PIN dots */
.pin-dots{display:flex;gap:16px;align-items:center;justify-content:center;}
.dot{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,0.2);background:transparent;transition:background .15s,border-color .15s,transform .15s;}
.dot.filled{background:var(--red);border-color:var(--red);transform:scale(1.1);}
.dot.error{background:#f87171;border-color:#f87171;animation:shake .35s ease;}

/* Keypad */
.keypad{width:100%;max-width:320px;display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
.key{height:64px;border-radius:16px;background:var(--card);border:1px solid var(--border);color:var(--text);font-family:'DM Sans',sans-serif;font-size:20px;font-weight:600;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:background .1s,transform .1s,border-color .12s;user-select:none;-webkit-tap-highlight-color:transparent;}
.key:active,.key.pressed{background:rgba(227,24,55,0.15);border-color:rgba(227,24,55,0.4);transform:scale(.94);}
.key .sub{font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--muted);}
.key.del{font-size:18px;}
.key.empty{background:transparent;border-color:transparent;cursor:default;pointer-events:none;}

/* Process button */
.btn{width:100%;max-width:320px;padding:15px;background:linear-gradient(135deg,#E31837,#a0101f);border:none;border-radius:14px;color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(227,24,55,.3);transition:opacity .2s,transform .15s;}
.btn:hover{opacity:.9;transform:translateY(-1px);}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;}

/* Processing overlay */
#processingOverlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9000;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#processingOverlay.show{display:flex;}
.proc-spin{width:52px;height:52px;border-radius:50%;border:3px solid rgba(227,24,55,.2);border-top-color:#E31837;animation:spin .75s linear infinite;}
.proc-text{font-size:14px;color:var(--muted);font-weight:500;letter-spacing:.5px;}

/* Success overlay */
#successOverlay{position:fixed;inset:0;background:var(--bg);z-index:9100;display:none;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:32px;animation:fadeUp .4s ease both;}
#successOverlay.show{display:flex;}
.success-icon{width:80px;height:80px;border-radius:50%;background:rgba(74,222,128,0.1);border:2px solid rgba(74,222,128,0.3);display:flex;align-items:center;justify-content:center;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both;}
.success-icon svg{stroke:#4ade80;}
.success-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;text-align:center;}
.success-sub{font-size:14px;color:var(--muted);text-align:center;line-height:1.6;max-width:260px;}
.success-ref{font-family:'DM Mono',monospace;font-size:12px;color:rgba(255,255,255,0.3);margin-top:4px;}
.success-btn{width:100%;max-width:320px;padding:15px;background:linear-gradient(135deg,#E31837,#a0101f);border:none;border-radius:14px;color:white;font-size:16px;font-weight:700;font-family:'DM Sans',sans-serif;cursor:pointer;box-shadow:0 8px 24px rgba(227,24,55,.3);}

/* Bottom nav */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;width:100%;height:var(--nav-h);background:rgba(14,14,14,.97);border-top:1px solid rgba(255,255,255,.08);backdrop-filter:blur(16px);display:flex;align-items:stretch;z-index:100;}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;text-decoration:none;color:var(--muted);font-size:10px;font-weight:600;cursor:pointer;transition:color .15s;border:none;background:none;font-family:'DM Sans',sans-serif;}
.nav-item.active,.nav-item:hover{color:#E31837;}
.nav-dot{width:4px;height:4px;border-radius:50%;background:#E31837;margin-top:-2px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
@keyframes popIn{from{opacity:0;transform:scale(.5)}to{opacity:1;transform:scale(1)}}
</style>
</head>
<body>

<div id="pageLoader"><div class="spin"></div></div>

<div id="shell">
  <div class="topbar">
    <a class="back-btn" href="send.html"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg></a>
    <span class="page-title">Enter PIN</span>
  </div>

  <div class="content">

    <div class="lock-wrap">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#E31837" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>

    <div class="pin-heading">
      <h2>Authorize Transfer</h2>
      <p>Enter your 4-digit transaction PIN<br/>to confirm this transfer</p>
    </div>

    <div class="pin-dots" id="pinDots">
      <div class="dot" id="d0"></div>
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>

    <div class="keypad" id="keypad">
      <button class="key" onclick="pressKey('1')">1</button>
      <button class="key" onclick="pressKey('2')">2<span class="sub">ABC</span></button>
      <button class="key" onclick="pressKey('3')">3<span class="sub">DEF</span></button>
      <button class="key" onclick="pressKey('4')">4<span class="sub">GHI</span></button>
      <button class="key" onclick="pressKey('5')">5<span class="sub">JKL</span></button>
      <button class="key" onclick="pressKey('6')">6<span class="sub">MNO</span></button>
      <button class="key" onclick="pressKey('7')">7<span class="sub">PQRS</span></button>
      <button class="key" onclick="pressKey('8')">8<span class="sub">TUV</span></button>
      <button class="key" onclick="pressKey('9')">9<span class="sub">WXYZ</span></button>
      <div class="key empty"></div>
      <button class="key" onclick="pressKey('0')">0</button>
      <button class="key del" onclick="deleteLast()">⌫</button>
    </div>

    <button class="btn" id="confirmBtn" disabled onclick="confirmPin()">
      Confirm Transfer
    </button>

  </div>
</div>

<!-- Processing overlay -->
<div id="processingOverlay">
  <div class="proc-spin"></div>
  <div class="proc-text">Processing transfer…</div>
</div>

<!-- Success overlay -->
<div id="successOverlay">
  <div class="success-icon">
    <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="20 6 9 17 4 12"/>
    </svg>
  </div>
  <div class="success-title">Transfer Sent!</div>
  <div class="success-sub">Your transfer has been initiated successfully and is being processed.</div>
  <div class="success-ref" id="successRef">REF: —</div>
  <button class="success-btn" onclick="location.href='dashboard.html'">Back to Home</button>
</div>

<nav class="bottom-nav">
  <a class="nav-item" href="dashboard.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Home</a>
  <a class="nav-item" href="card.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>Card</a>
  <a class="nav-item active" href="send.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>Send<div class="nav-dot"></div></a>
  <a class="nav-item" href="contact.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.5 19.5 0 0 1 1.61 3.4 2 2 0 0 1 3.6 1.22h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.9a16 16 0 0 0 6 6l.91-.91a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 21.73 16.92z"/></svg>Contact</a>
  <a class="nav-item" href="livechat.html"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>Chat</a>
</nav>

<script>
let pin='';

// Show shell after brief loader
setTimeout(()=>{
  document.getElementById('pageLoader').style.display='none';
  document.getElementById('shell').classList.add('show');
},500);

function pressKey(digit){
  if(pin.length>=4) return;
  pin+=digit;
  updateDots();
  animateKey(digit);
  if(pin.length===4) document.getElementById('confirmBtn').disabled=false;
}

function deleteLast(){
  if(!pin.length) return;
  pin=pin.slice(0,-1);
  document.getElementById('confirmBtn').disabled=true;
  updateDots();
}

function updateDots(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.toggle('filled',i<pin.length);
    d.classList.remove('error');
  }
}

function animateKey(digit){
  // find the pressed key button and flash it
  const btns=document.querySelectorAll('.key');
  btns.forEach(b=>{
    if(b.textContent.trim().startsWith(digit)){
      b.classList.add('pressed');
      setTimeout(()=>b.classList.remove('pressed'),150);
    }
  });
}

function triggerError(){
  for(let i=0;i<4;i++){
    const d=document.getElementById('d'+i);
    d.classList.remove('filled');
    d.classList.add('error');
  }
  setTimeout(()=>{
    pin='';
    updateDots();
    document.getElementById('confirmBtn').disabled=true;
  },600);
}

function confirmPin(){
  if(pin.length<4) return;
  const btn=document.getElementById('confirmBtn');
  btn.disabled=true;

  if(pin==='1959'){
    // Correct PIN — show processing spinner then go to blocked
    document.getElementById('processingOverlay').classList.add('show');
    setTimeout(()=>{ location.href='blocked.html'; },2800);
  } else {
    // Wrong PIN — shake dots and reset
    triggerError();
    setTimeout(()=>{ btn.disabled=false; },650);
  }
}

// Physical keyboard support
document.addEventListener('keydown',e=>{
  if(e.key>='0'&&e.key<='9') pressKey(e.key);
  if(e.key==='Backspace') deleteLast();
  if(e.key==='Enter'&&pin.length===4) confirmPin();
});
</script>
</body>
</html>
